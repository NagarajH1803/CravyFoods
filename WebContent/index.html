<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CravyFoods</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    
    <!-- Simple Top Navbar -->
    <header>
        <div class="navbar">
            <div class="nav-brand">
                <h1>CravyFoods</h1>
                <span>Food Delivery</span>
            </div>
            <div class="nav-links">
                <a href="register.html" class="nav-item">Register</a>
            </div>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to order from your favourite restaurants</p>
            </div>

            <!-- Alerts for dynamic statuses -->
            <div id="alert-container"></div>

            <form action="LoginServlet" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-auth">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <h2>CravyFoods</h2>
            </div>
            <div class="footer-text">
                &copy; 2026 CravyFoods. Your Favourite Food, Delivered Fresh.
            </div>
        </div>
    </footer>

    <!-- Script to parse query params and show pretty alerts -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const alertContainer = document.getElementById('alert-container');
            
            if (urlParams.has('error')) {
                const alert = document.createElement('div');
                alert.className = 'auth-alert auth-alert-error';
                alert.textContent = 'Invalid Username or Password! Please try again.';
                alertContainer.appendChild(alert);
            }
            
            if (urlParams.has('registered')) {
                const alert = document.createElement('div');
                alert.className = 'auth-alert auth-alert-success';
                alert.textContent = 'Account created successfully! Please login.';
                alertContainer.appendChild(alert);
            }
            
            if (urlParams.has('logout')) {
                const alert = document.createElement('div');
                alert.className = 'auth-alert auth-alert-success';
                alert.textContent = 'You have logged out successfully.';
                alertContainer.appendChild(alert);
            }
        });
    </script>
</body>
</html>
