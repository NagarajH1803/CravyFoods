<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CravyFoods</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    
    <!-- Simple Top Navbar -->
    <header>
        <div class="navbar">
            <div class="nav-brand">
                <h1>CravyFoods</h1>
                <span>Food Delivery</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-item">Login</a>
            </div>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Join CravyFoods</h2>
                <p>Create an account to browse and order from the best restaurants</p>
            </div>

            <!-- Alerts for dynamic statuses -->
            <div id="alert-container"></div>

            <form action="RegisterServlet" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required autocomplete="tel">
                </div>

                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" name="address" placeholder="Enter your delivery address" required autocomplete="street-address"></textarea>
                </div>

                <button type="submit" class="btn-auth">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="index.html">Login here</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <h2>CravyFoods</h2>
            </div>
            <div class="footer-text">
                &copy; 2026 CravyFoods. Your Favourite Food, Delivered Fresh.
            </div>
        </div>
    </footer>

    <!-- Script to parse query params and show pretty alerts -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const alertContainer = document.getElementById('alert-container');
            
            if (urlParams.get('error') === 'exists') {
                const alert = document.createElement('div');
                alert.className = 'auth-alert auth-alert-error';
                alert.textContent = 'Username already taken! Please choose another one.';
                alertContainer.appendChild(alert);
            }
            
            if (urlParams.get('error') === 'failed') {
                const alert = document.createElement('div');
                alert.className = 'auth-alert auth-alert-error';
                alert.textContent = 'Registration failed due to a server error. Please try again.';
                alertContainer.appendChild(alert);
            }
        });
    </script>
</body>
</html>
